<!DOCTYPE html>
<html lang="pt-br">
<head>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="app.js"></script>
  <link rel="stylesheet" href="index.css">
  <title>Login</title>
</head>

<body>
  <div id="tela1">
    <h2>Login</h2>

    <label>Email:</label>
    <input type="text" name="username" id="id"><br><br>
    <label>Password:</label>
    <input type="text" name="password" id="passwd"><br><br>
    <button onclick="botao()">Login</button>
    &nbsp;&nbsp;
    <button onclick="abrirModal()">Criar Conta</button>
  </div>

  
  <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">
    <div style="background:#fff; width:350px; margin:100px auto; padding:30px; border-radius:8px; position:relative;">
      <h3>Criar Conta</h3>

      <label>Email</label><br>
      <input type="email" id="novo-email" style="width:100%; margin-bottom:10px;"><br>

      <label>Senha:</label><br>
      <input type="password" id="novo-passwd" style="width:100%; margin-bottom:10px;"><br>

      <label>Nome:</label><br>
      <input type="text" id="novo-nome" style="width:100%; margin-bottom:20px;"><br>

      <button onclick="cadastrar()">Cadastrar</button>
      &nbsp;&nbsp;
      <button onclick="fecharModal()">Cancelar</button>

      <p id="msg-cadastro" style="margin-top:10px; color:green;"></p>
    </div>
  </div>

</body>
</html>
